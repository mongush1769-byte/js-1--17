<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Города</title>
</head>
<body>
      <input id="field" placeholder="Введите город">
    <div id="message"></div>

<script>
    let field = document.querySelector('#field');
    let message = document.querySelector('#message');
    
    let used = [];
    let player = 1;
    let lastLetter = '';
    
    field.onkeypress = function(event) {
        if (event.key === 'Enter') {
            let city = field.value.trim();
            field.value = '';
            
            if (city === '') {
                message.innerHTML = 'Введите город';
                return;
            }
            
            if (used.includes(city)) {
                message.innerHTML = 'Этот город уже был';
                return;
            }
            
            let first = city[0].toLowerCase();
            let last = city.slice(-1).toLowerCase();
            
            if (lastLetter !== '' && first !== lastLetter) {
                message.innerHTML = `Город должен начинаться на букву "${lastLetter}"`;
                return;
            }
            
            used.push(city);
            lastLetter = last;
            message.innerHTML = `Игрок ${player} назвал "${city}". Следующая буква: "${last}". Ходит игрок ${player === 1 ? 2 : 1}`;
            player = player === 1 ? 2 : 1;
        }
    };
</script>
    
</body>
</html>
