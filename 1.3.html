<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор круга</title>
</head>
<body>
    <script>
    let r = Number(prompt("Введите радиус круга:"));
    let pi = 3.14;
    let sqr = pi * r * r;
    let length = 2 * pi * r;
    alert("Площадь круга: " + sqr + "\nДлина окружности: " + length);
</script>
</body>
</html>
