<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аккордеон</title>
    <style>
        #parent {
            margin: 0 auto;
            width: 400px;
        }
        .tab {
            margin-bottom: 10px;
        }

        .tab .link a {
            display: block;
            padding: 10px;
            color: black;
            text-decoration: none;
            text-align: center;
            background: #f8f8f8;
            border: 1px solid gray;
        }
        .tab .link:hover a {
            background: #f2f2f2;
        }

        .tab:not(.active) .text {
            display: none;
        }
        .tab .text {
            border: 1px dashed gray;
            border-top: none;
            padding: 10px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div class="tab active">
            <div class="link">
                <a href="#">вкладка 1</a>
            </div>
            <div class="text">
                текст вкладки 1
            </div>
        </div>
        <div class="tab">
            <div class="link">
                <a href="#">вкладка 2</a>
            </div>
            <div class="text">
                текст вкладки 2
            </div>
        </div>
        <div class="tab">
            <div class="link">
                <a href="#">вкладка 3</a>
            </div>
            <div class="text">
                текст вкладки 3
            </div>
        </div>
    </div>

    <script>
        // Находим все ссылки
        let links = document.querySelectorAll('.tab .link a');
        
        // Для каждой ссылки добавляем обработчик
        for (let i = 0; i < links.length; i++) {
            links[i].onclick = function(event) {
                event.preventDefault(); 
                
                //Находим вкладку-родителя текущей ссылки
                let currentTab = this.closest('.tab');
                
                //Находим активную вкладку
                let activeTab = document.querySelector('.tab.active');
                
                // текущая вкладка уже активна, закрываем её
                if (currentTab.classList.contains('active')) {
                    currentTab.classList.remove('active');
                } else {
                    //убираем активную вкладку и активируем текущую
                    if (activeTab) {
                        activeTab.classList.remove('active');
                    }
                    currentTab.classList.add('active');
                }
            };
        }
    </script>
</body>
</html>
