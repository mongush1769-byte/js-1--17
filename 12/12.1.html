<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спойлеры</title>
    <style>
        .spoiler:not(.active) {
            display: none;
        }
    </style>
</head>
<body>
    <p>
        абзац с текстом
        <a href="#" class="toggle">развернуть спойлер 1</a>
    </p>
    <p class="spoiler">
        скрытый спойлер 1
    </p>
    <p>
        абзац с текстом
    </p>
    <p>
        абзац с текстом
        <a href="#" class="toggle">развернуть спойлер 2</a>
    </p>
    <p class="spoiler">
        скрытый спойлер 2
    </p>
    <p>
        абзац с текстом
    </p>
    <script>
        // находим ссылки-переключатели
        let toggles = document.querySelectorAll('.toggle');
        //  добавляем обработчик каждой ссылки 
        for (let i = 0; i < toggles.length; i++) {
            toggles[i].onclick = function(event) {
                event.preventDefault(); // Отменяем переход по ссылке

                // находим родителя ссылки (следующий элемент после родителя)
                let parent = this.parentNode; // <p> в котором находится ссылка
                let spoiler = parent.nextElementSibling; // следующий элемент - это спойлер
                
                // следующий элемент действительно спойлер
                if (spoiler && spoiler.classList.contains('spoiler')) {
                    // Переключаем active
                    spoiler.classList.toggle('active');
                    // меняем текст ссылки
                    if (spoiler.classList.contains('active')) {
                        this.textContent = 'свернуть спойлер ' + (i + 1);
                    } else {
                        this.textContent = 'развернуть спойлер ' + (i + 1);
                    }
                }
            };
        }
    </script>
</body>
</html>
