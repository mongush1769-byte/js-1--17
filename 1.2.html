<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор прямоугольника</title>
</head>
<body>
    <script>
        let a = Number(prompt("Введите сторону a"));
        let b = Number(prompt("Введите сторону b"));
        let sqr = a * b;
        let per = (a + b) * 2;
        alert("Площадь: " + sqr + "\nПериметр: " + per);
    </script>
</body>
</html>
